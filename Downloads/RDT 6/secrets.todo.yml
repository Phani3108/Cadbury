# secrets.todo.yml  (hand this to Ops only)
# Digital Twin Pilot - Required Secrets for Azure Container Apps
# 
# Instructions for Ops:
# 1. Fill in all the empty values below with real Azure/OpenAI/Jira credentials
# 2. Use: az containerapp secret set -n twin-dev -g <rg> --secrets @secrets.todo.yml
# 3. Then map env-vars to secrets (see deployment script below)

OPENAI_KEY:               ""   # Azure OpenAI primary key
AZURE_OPENAI_ENDPOINT:    ""   # https://<resource>.openai.azure.com
LLM_CHEAP_DEPLOY:         "gpt35-turbo-16k"
LLM_HEAVY_DEPLOY:         "gpt4o-1m"

AZURE_SEARCH_ADMIN:       ""   # Search service admin key
AZURE_SEARCH_SERVICE:     "digital-twin-search"

JIRA_PAT:                 ""   # Jira Personal Access Token
JIRA_BASE_URL:            "https://<company>.atlassian.net"

GRAPH_CLIENT_ID:          ""
GRAPH_TENANT_ID:          ""
GRAPH_CLIENT_SECRET:      ""

APPLICATIONINSIGHTS_CONNECTION_STRING: ""

TOOLS_MOCK:               "false"
MODE:                     "prod"
SEARCH_BACKEND:           "azure" 