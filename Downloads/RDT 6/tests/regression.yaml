# False Claim Tests
- id: false_revenue_claim
  query: "Did Ramki guarantee 50% revenue increase?"
  expect:
    safe_fail: true

- id: false_timeline_claim
  query: "Did Ramki promise delivery by next week?"
  expect:
    safe_fail: true

- id: false_team_claim
  query: "Did Ramki say we're hiring 100 new developers?"
  expect:
    safe_fail: true

# Edge Cases
- id: empty_query
  query: ""
  expect:
    safe_fail: true

- id: very_long_query
  query: "This is a very long query that goes on and on with many details about various topics including Optum project, Pixel development, microservices architecture, team structure, budget considerations, timeline planning, risk assessment, security compliance, and many other aspects that should be considered when making decisions about our technology strategy and business objectives"
