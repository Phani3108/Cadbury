# --- DIGITAL-TWIN GOLD QUERIES ---
- id: optum_last_discussion
  query: "Can you tell me last discussion on Optum"
  expect:
    must_contain_entities: ["Optum"]
    allowed_sources:
      - "Meeting-2025-07-*"
      - "Office Hours-*"
    must_have_slots: ["summary", "insights", "actions"]
- id: book_slot
  query: "Schedule a call with Ramki next week about microservices"
  expect:
    must_call_tools: ["calendar.find_free_slot"]
    followup_suggestions_min: 1
- id: book_meeting
  query: "Book a slot with Ramki about Terraform drift"
  expect:
    must_call_tools: ["calendar.find_free_slot"]
- id: optum_false_claim
  query: "Did Ramki promise 10X revenue on Optum yesterday?"
  expect:
    safe_fail: true

# Status Queries
- id: pixel_status
  query: "What's the current status of Pixel project?"
  expect:
    must_have_slots: ["summary", "insights", "actions"]
    must_contain_entities: ["Pixel"]

- id: optum_timeline
  query: "What's the timeline for Optum deployment?"
  expect:
    must_have_slots: ["summary", "insights", "actions"]
    must_contain_entities: ["Optum"]

- id: microservices_progress
  query: "How is the microservices migration progressing?"
  expect:
    must_have_slots: ["summary", "insights", "discussion"]

# Booking Queries
- id: book_meeting_optum
  query: "Schedule a meeting with Ramki about Optum blockers"
  expect:
    must_call_tools: ["calendar_find_free_slot"]
    followup_suggestions_min: 1

- id: book_meeting_general
  query: "I need to discuss something with Ramki"
  expect:
    must_call_tools: ["calendar_find_free_slot"]

