name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]"

      - name: Lint backend
        working-directory: backend
        run: ruff check .

      - name: Run backend tests
        working-directory: backend
        run: pytest tests/ -v --tb=short

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npx next lint

      - name: Type check frontend
        working-directory: frontend
        run: npx tsc --noEmit

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t cadbury-backend ./backend

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile.prod -t cadbury-frontend ./frontend
